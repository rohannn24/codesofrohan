<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms in HTML</title>
  </head>
  <body>
    <form action="https://formspree.io/f/mbjnjjky" method="POST">
      <label for="fullname">Full Name:</label><br />
      <input name="Fullname" type="text" required="" /><br />
      <label for="username">Username:</label><br />
      <input name="Username" type="text" required="" /><br />
      <label for="password">Password:</label><br />
      <input name="password" type="password" required="" /><br />
      <label for="email">Email:</label><br />
      <input name="email" type="email" required="" /><br />
      <label for="Gender">Gender:</label><br />
      <label for="Male">Male</label>
      <input name="Male" type="radio" required="" />
      <label for="Female">Female</label>
      <input name="Female" type="radio" /><br />
      <label for="DOB">Date of Birth:</label><br />
      <input name="DOB" type="date" required="" /><br />
      <label for="Subject">Subject:</label>
      <select name="subject">
        <option value="option 1">Subject 1</option>
        <option value="option 2">Subject 2</option>
        <option value="option 3">Subject 3</option></select
      ><br />
      <label for="address" required="">Address:</label><br />
      <textarea name="address" cols="20" rows="10" required=""></textarea><br />
      <input type="submit" />
    </form>
  </body>
</html>
